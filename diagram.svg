  <!-- SPQR crate -->
  <rect x="5" y="80" width="64" height="28" rx="2" fill="#C85A2B"/>
  <line x1="5" y1="88" x2="69" y2="88" stroke="white" stroke-opacity="0.15" stroke-width="0.3"/>
