<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 178" width="210mm" height="178mm">
  <defs>
    <marker id="dep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="3" markerHeight="3" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#A07040"/>
    </marker>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="3.5" markerHeight="3.5" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#777"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="3" markerHeight="3" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#9B74CC"/>
    </marker>
  </defs>

  <rect width="210" height="178" fill="#F7F8FA"/>

  <!-- ===== TITLE ===== -->
  <text x="105" y="8" font-size="6" font-weight="bold" fill="#1B2A4A" text-anchor="middle" font-family="sans-serif">Verify Libsignal in Lean</text>
  <text x="105" y="12" font-size="1.7" fill="#8090A8" text-anchor="middle" font-style="italic" font-family="sans-serif">Verify — proofs live side-by-side with code, called in CI; end-to-end functional verification to security proofs</text>

  <!-- ===== PROOF BOXES (from diagram1) ===== -->
  <text x="5" y="16" font-size="2.5" font-weight="bold" fill="#444" font-family="sans-serif">Security Proofs</text>

  <!-- PQXDH -->
  <rect x="5" y="18" width="47" height="34" rx="2" fill="#2B4C7E"/>
  <text x="28.5" y="26" font-size="3" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">PQXDH</text>
  <text x="28.5" y="29.5" font-size="2" fill="white" opacity="0.8" text-anchor="middle" font-family="sans-serif">Computational Proof</text>
  <line x1="8" y1="31" x2="48" y2="31" stroke="white" stroke-opacity="0.15" stroke-width="0.3"/>
  <text x="7" y="34.5" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">Lean theorem: PQXDH achieves its</text>
  <text x="7" y="37" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">security definition. Reduces to</text>
  <text x="7" y="39.5" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">ML-KEM hardness &amp; CDH.</text>

  <!-- Double Ratchet -->
  <rect x="56" y="18" width="47" height="34" rx="2" fill="#3A5F8A"/>
  <text x="79.5" y="26" font-size="3" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">Double Ratchet</text>
  <text x="79.5" y="29.5" font-size="2" fill="white" opacity="0.8" text-anchor="middle" font-family="sans-serif">Computational Proof</text>
  <line x1="59" y1="31" x2="99" y2="31" stroke="white" stroke-opacity="0.15" stroke-width="0.3"/>
  <text x="59" y="34.5" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">Formalise in Lean the security</text>
  <text x="59" y="37" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">theorem of Cohn-Gordon et al.</text>
  <text x="59" y="39.5" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">2019.</text>

  <!-- SPQR / Triple Ratchet -->
  <rect x="107" y="18" width="47" height="34" rx="2" fill="#4A7396"/>
  <text x="130.5" y="26" font-size="2.6" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">SPQR / Triple Ratchet</text>
  <text x="130.5" y="29.5" font-size="2" fill="white" opacity="0.8" text-anchor="middle" font-family="sans-serif">Proof</text>
  <line x1="110" y1="31" x2="150" y2="31" stroke="white" stroke-opacity="0.15" stroke-width="0.3"/>
  <text x="110" y="34.5" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">Formalise SPQR security proof</text>
  <text x="110" y="37" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">from EuroCrypt / USENIX papers,</text>
  <text x="110" y="39.5" font-size="1.7" fill="white" opacity="0.7" font-family="sans-serif">building on ratchet infrastructure.</text>

  <!-- Protocol Composition (BONUS) -->
  <rect x="158" y="18" width="47" height="34" rx="2" fill="#E8C547" fill-opacity="0.3" stroke="#C9A020" stroke-width="0.8" stroke-dasharray="2,1"/>
  <rect x="160" y="20" width="14" height="3.5" rx="1" fill="#C9A020"/>
  <text x="167" y="22.5" font-size="1.5" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">BONUS</text>
  <text x="181.5" y="28" font-size="2.5" font-weight="bold" fill="#5A4A00" text-anchor="middle" font-family="sans-serif">Protocol Composition</text>
  <line x1="162" y1="30" x2="201" y2="30" stroke="#5A4A00" stroke-opacity="0.2" stroke-width="0.3"/>
  <text x="161" y="33.5" font-size="1.7" fill="#5A4A00" opacity="0.7" font-family="sans-serif">PQXDH init + Triple Ratchet →</text>
  <text x="161" y="36" font-size="1.7" fill="#5A4A00" opacity="0.7" font-family="sans-serif">end-to-end security for a full</text>
  <text x="161" y="38.5" font-size="1.7" fill="#5A4A00" opacity="0.7" font-family="sans-serif">conversation session.</text>

  <!-- ===== ABSTRACT CRYPTOGRAPHIC INFRASTRUCTURE (from diagram1) ===== -->
  <text x="5" y="56" font-size="2.5" font-weight="bold" fill="#444" font-family="sans-serif">Abstract Cryptographic Infrastructure</text>
  <text x="132" y="56" font-size="1.5" fill="#B83030" font-style="italic" font-family="sans-serif">Security Games</text>

  <!-- Primitives -->
  <rect x="5" y="59" width="28" height="14" rx="1.5" fill="#1E7A5A"/>
  <text x="19" y="67.5" font-size="2.4" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">KEM</text>
  <text x="19" y="70.5" font-size="1.2" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">Key Encapsulation</text>

  <rect x="36" y="59" width="28" height="14" rx="1.5" fill="#1E7A5A"/>
  <text x="50" y="67.5" font-size="2.4" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">DH</text>
  <text x="50" y="70.5" font-size="1.2" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">Diffie–Hellman</text>

  <rect x="67" y="59" width="28" height="14" rx="1.5" fill="#1E7A5A"/>
  <text x="81" y="67.5" font-size="2.4" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">AEAD</text>
  <text x="81" y="70.5" font-size="1.2" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">Auth. Encryption</text>

  <rect x="98" y="59" width="28" height="14" rx="1.5" fill="#1E7A5A"/>
  <text x="112" y="67.5" font-size="2.4" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">KDF</text>
  <text x="112" y="70.5" font-size="1.2" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">Key Derivation</text>

  <!-- Security Games -->
  <rect x="132" y="59" width="32" height="14" rx="1.5" fill="#B83030"/>
  <text x="148" y="67.5" font-size="2.2" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">IND-CCA2</text>
  <text x="148" y="70.5" font-size="1.1" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">Chosen-Ciphertext</text>

  <rect x="167" y="59" width="24" height="14" rx="1.5" fill="#B83030"/>
  <text x="179" y="67.5" font-size="2.4" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">PRF</text>
  <text x="179" y="70.5" font-size="1.1" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">Pseudorandom Fn</text>

  <rect x="194" y="59" width="11" height="14" rx="1.5" fill="#B83030" fill-opacity="0.4" stroke="#B83030" stroke-width="0.4" stroke-dasharray="1.5,1"/>
  <text x="199.5" y="68" font-size="2.5" fill="#B83030" text-anchor="middle" font-family="sans-serif">…</text>

  <!-- ===== FUNCTIONAL CORRECTNESS SCOPE (from diagram-fc, scaled ×4/3 horizontally) ===== -->
  <text x="5" y="78" font-size="2.5" font-weight="bold" fill="#444" font-family="sans-serif">Functional Correctness Scope</text>
  <text x="90" y="78" font-size="1.5" fill="#8090A8" font-family="sans-serif">~113,000 lines of Rust across 16 crates</text>

  <!-- Signal row -->
  <text x="5" y="82" font-size="2.2" font-weight="bold" fill="#2B4C7E" font-family="sans-serif">libsignal</text>
  <text x="48" y="82" font-size="1.5" fill="#8090A8" font-family="sans-serif">~22,400 lines</text>

  <!-- spqr -->
  <rect x="5" y="86" width="48" height="24" rx="2" fill="#3A5F8A"/>
  <text x="29" y="99" font-size="2.8" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">spqr</text>
  <text x="29" y="106" font-size="1.4" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~8,800</text>

  <!-- libsignal-protocol -->
  <rect x="57" y="86" width="59" height="24" rx="2" fill="#2B4C7E"/>
  <text x="86.5" y="96" font-size="2" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">libsignal-</text>
  <text x="86.5" y="99.5" font-size="2" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">protocol</text>
  <text x="86.5" y="106" font-size="1.4" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~10,900</text>

  <!-- signal-crypto -->
  <rect x="120" y="86" width="41" height="24" rx="2" fill="#5A87A6"/>
  <text x="140.5" y="96" font-size="1.8" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">signal-</text>
  <text x="140.5" y="99.5" font-size="1.8" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">crypto</text>
  <text x="140.5" y="106" font-size="1.4" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~880</text>

  <!-- libsignal-core -->
  <rect x="165" y="86" width="40" height="24" rx="2" fill="#4A7396"/>
  <text x="185" y="96" font-size="1.8" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">libsignal-</text>
  <text x="185" y="99.5" font-size="1.8" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">core</text>
  <text x="185" y="106" font-size="1.4" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~1,800</text>

  <!-- Crypto primitives row -->
  <text x="5" y="117" font-size="2.2" font-weight="bold" fill="#1E7A5A" font-family="sans-serif">RustCrypto / other</text>
  <text x="81" y="117" font-size="1.5" fill="#8090A8" font-family="sans-serif">~12,100 lines</text>

  <!-- aes-gcm-siv -->
  <rect x="5" y="120" width="37" height="18" rx="1.5" fill="#1E7A5A"/>
  <text x="24" y="130" font-size="1.7" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">aes-gcm-siv</text>
  <text x="24" y="135" font-size="1.3" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~830</text>

  <!-- aes -->
  <rect x="46" y="120" width="35" height="18" rx="1.5" fill="#1E7A5A"/>
  <text x="64" y="131" font-size="2.2" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">aes</text>
  <text x="64" y="135" font-size="1.3" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~6,650</text>

  <!-- sha2 -->
  <rect x="85" y="120" width="35" height="18" rx="1.5" fill="#1E7A5A"/>
  <text x="102" y="131" font-size="2.2" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">sha2</text>
  <text x="102" y="135" font-size="1.3" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~2,400</text>

  <!-- hpke-rs -->
  <rect x="124" y="120" width="37" height="18" rx="1.5" fill="#2A7B7B"/>
  <text x="142" y="131" font-size="2.2" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">hpke-rs</text>
  <text x="142" y="135" font-size="1.3" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~2,200</text>

  <!-- x25519-dalek -->
  <rect x="165" y="120" width="40" height="18" rx="1.5" fill="#7C5A2E"/>
  <text x="185" y="127.5" font-size="1.7" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">x25519-</text>
  <text x="185" y="131" font-size="1.7" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">dalek</text>
  <text x="185" y="135" font-size="1.3" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~680</text>

  <!-- Bottom row -->
  <rect x="5" y="148" width="93" height="24" rx="2" fill="#6B3FA0"/>
  <text x="52" y="159" font-size="3" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">libcrux</text>
  <text x="52" y="164" font-size="1.8" fill="white" opacity="0.7" text-anchor="middle" font-family="sans-serif">8 crates · ~44,600</text>
  <text x="52" y="168" font-size="1.5" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">ml-kem, hmac, sha2/3, hacl-rs…</text>

  <rect x="112" y="148" width="93" height="24" rx="2" fill="#7C5A2E"/>
  <text x="158" y="161" font-size="3" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">curve25519-dalek</text>
  <text x="158" y="168" font-size="1.5" fill="white" opacity="0.6" text-anchor="middle" font-family="sans-serif">~33,000</text>

  <!-- ===== DEPENDENCY ARROWS ===== -->

  <!-- Signal intra-row dependencies (short gap arrows) -->
  <!-- libsignal-protocol → spqr (leftward) -->
  <line x1="57" y1="98" x2="53" y2="98" stroke="#777" stroke-width="0.4" marker-end="url(#arr)"/>
  <!-- libsignal-protocol → signal-crypto (rightward) -->
  <line x1="116" y1="98" x2="120" y2="98" stroke="#777" stroke-width="0.4" marker-end="url(#arr)"/>
  <!-- signal-crypto → libsignal-core (rightward) -->
  <line x1="161" y1="98" x2="165" y2="98" stroke="#777" stroke-width="0.4" marker-end="url(#arr)"/>

  <!-- Signal → Crypto primitives -->
  <!-- libsignal-protocol → aes-gcm-siv -->
  <line x1="86.5" y1="110" x2="24" y2="120" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>
  <!-- spqr → sha2 -->
  <line x1="29" y1="110" x2="102" y2="120" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>
  <!-- signal-crypto → hpke-rs -->
  <line x1="140.5" y1="110" x2="142" y2="120" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>
  <!-- signal-crypto → aes -->
  <line x1="140.5" y1="110" x2="64" y2="120" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>
  <!-- libsignal-core → x25519-dalek -->
  <line x1="185" y1="110" x2="185" y2="120" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>
  <!-- libsignal-core → sha2 -->
  <line x1="185" y1="110" x2="102" y2="120" stroke="#777" stroke-width="0.4" marker-end="url(#arr)"/>

  <!-- Crypto → Crypto -->
  <line x1="42" y1="129" x2="46" y2="129" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- → curve25519-dalek -->
  <line x1="29" y1="110" x2="158" y2="148" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="185" y1="138" x2="158" y2="148" stroke="#777" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- → libcrux -->
  <line x1="29" y1="110" x2="52" y2="148" stroke="#9B74CC" stroke-width="0.5" opacity="0.7" marker-end="url(#arr-p)"/>
  <line x1="142" y1="138" x2="52" y2="148" stroke="#9B74CC" stroke-width="0.5" opacity="0.7" marker-end="url(#arr-p)"/>

</svg>
