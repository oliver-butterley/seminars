name: Build and deploy slide decks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        deck: [seattle-2026, torino-2026]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.deck }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.deck }}

      - name: Build slides
        run: npx slidev build --out dist --base /seminars/${{ matrix.deck }}/
        working-directory: ${{ matrix.deck }}

      - name: Copy static assets into dist
        run: |
          cp -rL images dist/images
          [ -f pipeline.svg ] && cp pipeline.svg dist/ || true
        working-directory: ${{ matrix.deck }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.deck }}
          path: ${{ matrix.deck }}/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download seattle-2026
        uses: actions/download-artifact@v4
        with:
          name: seattle-2026
          path: pages/seattle-2026

      - name: Download torino-2026
        uses: actions/download-artifact@v4
        with:
          name: torino-2026
          path: pages/torino-2026

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
